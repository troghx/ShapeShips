<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Liquid Glass</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #030508;
            user-select: none;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* ── Deep Aurora Background ──────────────────── */
        #aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(circle at 15% 50%, rgba(66, 133, 244, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(155, 114, 203, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(217, 101, 112, 0.15) 0%, transparent 50%);
            animation: aurora-drift 15s ease-in-out infinite alternate;
        }

        @keyframes aurora-drift {
            0%   { transform: scale(1) translate(0, 0); }
            50%  { transform: scale(1.05) translate(-2%, 2%); }
            100% { transform: scale(1) translate(0, 0); }
        }

        /* ── Cube Grid ──────────────────────────── */
        #grid {
            position: fixed;
            inset: 0;
            z-index: 2;
            display: grid;
            pointer-events: none;
        }

        .cube { 
            will-change: transform; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            position: absolute;
            inset: 4px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateZ(0);
            will-change: transform, background, border-color, box-shadow;
            transition: opacity 0.3s ease;
        }

        /* Liquid Blur Effect applied dynamically */
        .glass.is-blurred {
            backdrop-filter: blur(16px) saturate(150%);
            -webkit-backdrop-filter: blur(16px) saturate(150%);
        }

        /* Top Sheen Reflection for Liquid effect */
        .glass::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
            border-radius: 8px 8px 0 0;
            pointer-events: none;
        }

        /* ── The Gemini Orb ───────────────────────── */
        #orb-wrap {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
            will-change: transform;
        }

        #orb {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            position: relative;
            transform: translate(-50%, -50%);
            pointer-events: all;
            cursor: grab;
        }

        #orb:active {
            cursor: grabbing;
        }

        /* Wide ambient light passing through glass */
        #orb-ambient {
            position: absolute;
            inset: -300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            filter: blur(60px);
            opacity: 0.8;
            mix-blend-mode: screen;
        }

        /* Core Orb using Gemini Colors */
        #orb-core {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg, 
                #4285f4, 
                #9b72cb, 
                #d96570, 
                #9b72cb, 
                #4285f4
            );
            filter: blur(8px);
            animation: spin 8s linear infinite;
            box-shadow: 0 0 50px rgba(155, 114, 203, 0.5), inset 0 0 20px rgba(255,255,255,0.8);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Intense glowing core */
        #orb-inner {
            position: absolute;
            inset: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
        }
        
        /* ── Hint ───────────────────────────────── */
        #hint {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            z-index: 30;
            pointer-events: none;
            animation: hint-out 5s ease 1.5s forwards;
        }

        @keyframes hint-out {
            0%, 65% { opacity: 1; }
            100%    { opacity: 0; }
        }
    </style>
</head>
<body>

<div id="aurora"></div>
<div id="grid"></div>

<div id="orb-wrap">
    <div id="orb">
        <div id="orb-ambient"></div>
        <div id="orb-core"></div>
        <div id="orb-inner"></div>
    </div>
</div>

<div id="hint">click para ondas · mueve el ratón</div>

<script>
(() => {
    'use strict';

    // ── Configuration ──
    const CUBE_SIZE = 70;      // Tamaño de las celdas (menor = más detalle pero más costo)
    const RADIUS = 300;        // Radio de influencia de la luz
    const TILT_MAX = 35;       // Inclinación máxima 3D
    const SPRING_K = 0.08;     // Tensión del resorte (seguimiento)
    const SPRING_D = 0.8;      // Amortiguación del resorte
    const RIPPLE_SPEED = 6.0;  // Velocidad de expansión de la onda
    const RIPPLE_DECAY = 0.92; // Desvanecimiento de la onda
    const BLUR_DIST_SQ = RADIUS * RADIUS;

    // ── State ──
    let W = innerWidth, H = innerHeight;
    let ox = W / 2, oy = H / 2;
    let vx = 0, vy = 0;
    let tx = W / 2, ty = H / 2;
    let isDragging = false;
    let cubes = [];
    let ripples = [];

    // ── Elements ──
    const gridEl = document.getElementById('grid');
    const orbWrap = document.getElementById('orb-wrap');
    const orbEl = document.getElementById('orb');

    // ── Build Grid ──
    function buildGrid() {
        gridEl.innerHTML = '';
        cubes = [];

        const cols = Math.ceil(W / CUBE_SIZE) + 1;
        const rows = Math.ceil(H / CUBE_SIZE) + 1;

        gridEl.style.gridTemplateColumns = `repeat(${cols}, ${CUBE_SIZE}px)`;
        gridEl.style.gridTemplateRows = `repeat(${rows}, ${CUBE_SIZE}px)`;

        const fragment = document.createDocumentFragment();

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const el = document.createElement('div');
                el.className = 'cube';
                const gl = document.createElement('div');
                gl.className = 'glass';
                el.appendChild(gl);
                fragment.appendChild(el);
                
                cubes.push({
                    el, gl,
                    cx: c * CUBE_SIZE + CUBE_SIZE / 2,
                    cy: r * CUBE_SIZE + CUBE_SIZE / 2,
                    active: false,
                    blurred: false,
                });
            }
        }
        gridEl.appendChild(fragment);
    }

    // ── Interaction ──
    orbEl.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        isDragging = true;
        e.preventDefault();
    });

    // En la versión Gemini, dejamos que siempre siga el ratón
    document.addEventListener('mousemove', e => {
        tx = e.clientX; 
        ty = e.clientY;
    });

    document.addEventListener('mouseup', () => isDragging = false);

    document.addEventListener('click', e => {
        // Generar onda expansiva
        const dx = e.clientX - ox, dy = e.clientY - oy;
        if (dx * dx + dy * dy < 90 * 90) return; // Ignorar clicks directos en el centro del orbe
        ripples.push({ x: e.clientX, y: e.clientY, r: 0, s: 1.0 });
    });

    // Touch
    orbEl.addEventListener('touchstart', e => {
        isDragging = true;
        e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', e => {
        if (!e.touches[0]) return;
        tx = e.touches[0].clientX;
        ty = e.touches[0].clientY;
        e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchend', () => isDragging = false);

    // ── Animation Loop ──
    let lastTime = performance.now();

    function animate(time) {
        const dt = Math.min((time - lastTime) / 16.67, 3);
        lastTime = time;

        // Físicas del orbe (seguimiento suave con resorte)
        vx = (vx + (tx - ox) * SPRING_K) * SPRING_D;
        vy = (vy + (ty - oy) * SPRING_K) * SPRING_D;
        ox += vx * dt;
        oy += vy * dt;

        orbWrap.style.transform = `translate(${ox}px, ${oy}px)`;

        // Procesar las ondas (ripples)
        for (let i = ripples.length - 1; i >= 0; i--) {
            ripples[i].r += RIPPLE_SPEED * dt;
            ripples[i].s *= Math.pow(RIPPLE_DECAY, dt);
            if (ripples[i].s < 0.01) ripples.splice(i, 1);
        }

        // Actualizar los cubos de cristal
        for (let i = 0; i < cubes.length; i++) {
            const cube = cubes[i];
            const dx = cube.cx - ox;
            const dy = cube.cy - oy;
            const d2 = dx * dx + dy * dy;
            const dist = Math.sqrt(d2);
            const inBlurRange = d2 <= BLUR_DIST_SQ;

            // Influencia de la proximidad al orbe (0 a 1)
            const p = Math.max(0, 1 - dist / RADIUS);
            const smoothInfluence = p * p * (3 - 2 * p); // Función smoothstep

            // Influencia de las ondas expansivas
            let rippleInfluence = 0;
            for (let j = 0; j < ripples.length; j++) {
                const w = ripples[j];
                const rdx = cube.cx - w.x;
                const rdy = cube.cy - w.y;
                const rd = Math.sqrt(rdx * rdx + rdy * rdy);
                // Curva gaussiana para el anillo de la onda
                const wave = Math.exp(-Math.pow(rd - w.r, 2) / 4000) * w.s;
                if (wave > rippleInfluence) rippleInfluence = wave;
            }

            const totalInfluence = Math.max(smoothInfluence, rippleInfluence * 0.8);

            // Optimización: dormir los cubos que están lejos
            if (totalInfluence < 0.005) {
                if (cube.active) {
                    cube.el.style.transform = '';
                    cube.gl.style.cssText = '';
                    cube.active = false;
                }
                if (cube.blurred) {
                    cube.gl.classList.remove('is-blurred');
                    cube.blurred = false;
                }
                continue;
            }

            cube.active = true;

            // Añadir/quitar clase CSS de blur dinámicamente
            if (inBlurRange || rippleInfluence > 0.1) {
                if (!cube.blurred) {
                    cube.gl.classList.add('is-blurred');
                    cube.blurred = true;
                }
            } else if (cube.blurred) {
                cube.gl.classList.remove('is-blurred');
                cube.blurred = false;
            }

            // Inclinación "Liquid Glass" en 3D
            const tiltY = (dx / RADIUS) * TILT_MAX * smoothInfluence;
            const tiltX = -(dy / RADIUS) * TILT_MAX * smoothInfluence;
            const scale = 1 + totalInfluence * 0.15;

            cube.el.style.transform = `perspective(400px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(${scale})`;

            // Mezclar colores de Gemini dependiendo de la zona
            // Izquierda = Azul, Arriba/Derecha = Púrpura, Abajo = Rojo
            const normX = (dx / RADIUS); // -1 a 1
            const normY = (dy / RADIUS); // -1 a 1
            
            let r = 155, g = 114, b = 203; // Base Púrpura
            if (normX < -0.3) { r = 66; g = 133; b = 244; } // Azulado
            else if (normY > 0.3) { r = 217; g = 101; b = 112; } // Rojizo
            
            // Iluminar ligeramente si hay onda
            if (rippleInfluence > 0) {
                r = Math.min(255, r + (rippleInfluence * 80));
                g = Math.min(255, g + (rippleInfluence * 80));
                b = Math.min(255, b + (rippleInfluence * 80));
            }

            const bgAlpha = 0.02 + totalInfluence * 0.25;
            const borderAlpha = 0.05 + totalInfluence * 0.5;
            const glowAlpha = totalInfluence * 0.5;

            // Inyectar estilos en línea directamente (más rápido que modificar variables CSS constántemente)
            cube.gl.style.background = `rgba(${r}, ${g}, ${b}, ${bgAlpha})`;
            cube.gl.style.borderColor = `rgba(255, 255, 255, ${borderAlpha})`;
            cube.gl.style.boxShadow = `
                inset 0 0 ${10 * totalInfluence}px rgba(255, 255, 255, 0.2),
                0 0 ${25 * totalInfluence}px rgba(${r}, ${g}, ${b}, ${glowAlpha})
            `;
        }

        requestAnimationFrame(animate);
    }

    // ── Init & Resize ──
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            W = innerWidth; H = innerHeight;
            ox = W / 2; oy = H / 2;
            tx = W / 2; ty = H / 2;
            vx = vy = 0;
            buildGrid();
        }, 150);
    });

    buildGrid();
    orbWrap.style.transform = `translate(${ox}px, ${oy}px)`;
    requestAnimationFrame(animate);

})();
</script>
</body>
</html>
